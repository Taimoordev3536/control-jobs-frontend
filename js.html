<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Alerts Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;  /* Horizontal center */
      align-items: center;      /* Vertical center */
      background: #f4f6f9;
    }

    /* Notification bell */
    .notification {
      position: relative;
      display: inline-block;
      cursor: pointer;
    }

    .bell {
      font-size: 48px; /* Bigger bell */
    }

    /* Red badge */
    .badge {
      position: absolute;
      top: -8px;
      right: -8px;
      padding: 6px 8px;
      border-radius: 50%;
      background: red;
      color: white;
      font-size: 14px;
      font-weight: bold;
    }

    /* Dropdown */
    .dropdown {
      display: none;
      position: absolute;
      top: 60px; /* below the bell */
      left: 50%;
      transform: translateX(-50%);
      width: 320px;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      border-radius: 8px;
      overflow: hidden;
      z-index: 10;
    }

    .dropdown.active {
      display: block;
    }

    .dropdown h4 {
      background: #007bff;
      color: white;
      padding: 10px;
      margin: 0;
      font-size: 16px;
    }

    .alert {
      padding: 12px;
      border-bottom: 1px solid #eee;
      font-size: 14px;
    }

    .alert:last-child {
      border-bottom: none;
    }

    .alert.delay { color: #d9534f; }     /* Red for delay */
    .alert.signout { color: #5bc0de; }   /* Blue for sign-out */
    .alert.duration { color: #f0ad4e; }  /* Orange for short duration */
  </style>
</head>
<body>

  <div class="notification" onclick="toggleDropdown()">
    <span class="bell">🔔</span>
    <span class="badge" id="alertCount">3</span>

    <div class="dropdown" id="dropdown">
      <h4>Alerts</h4>
      <div class="alert delay">⚠ Worker John checked in 15 min late (Grace: 10 min)</div>
      <div class="alert signout">✅ Worker Sarah signed out from Job #25</div>
      <div class="alert duration">⚠ Worker Mike worked 6h, expected 8h (Grace: 30m)</div>
    </div>
  </div>

  <script>
    function toggleDropdown() {
      document.getElementById("dropdown").classList.toggle("active");
    }
  </script>

</body>
</html>
