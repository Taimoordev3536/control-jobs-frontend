<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jobs Control UI</title>
<link href="https://cdn.jsdelivr.net/npm/remixicon@3.4.0/fonts/remixicon.css" rel="stylesheet">

<style>
    body { 
        font-family: Arial, sans-serif; 
        background: #f3f4f6; 
        margin: 0; 
        padding: 20px; 
    }

    /* FILTER BOX */
    .filter-box {
        background: white;
        padding: 20px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        margin-bottom: 20px;
    }

    .filter-header {
        font-size: 20px;
        margin-bottom: 18px;
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: bold;
    }

    .filter-header i {
        background: #662D91;
        padding: 10px;
        border-radius: 10px;
        color: white;
    }

    .filters-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 20px;
    }

    .filter-item label {
        font-size: 14px;
        color: #555;
        display: block;
        margin-bottom: 5px;
    }

    select, input[type="date"] {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #d1d5db;
        background: #fafafa;
        font-size: 14px;
    }

    /* TABLE */
    .table-box {
        background: white;
        border-radius: 12px;
        padding: 0;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .table-header {
        display: flex;
        justify-content: space-between;
        padding: 15px 20px;
        border-bottom: 1px solid #eee;
        align-items: center;
    }

    .table-header h3 {
        margin: 0;
        font-size: 20px;
    }

    .export-icons i {
        font-size: 22px;
        margin-left: 15px;
        cursor: pointer;
        color: #6b21a8;
    }

    table {
        width: 100%;
        border-collapse: separate;
        border-spacing: 0;
        border-radius: 12px;
        overflow: hidden;
        box-shadow: 0 2px 8px rgba(128,0,128,0.04);
    }

    th {
        background: #f5f3ff;
        padding: 14px 10px;
        font-size: 15px;
        color: #662D91;
        border: 2px solid #662D91;
        border-bottom: 2px solid #662D91;
        border-right: 1px solid #ede9fe;
        cursor: pointer;
        font-weight: 600;
        text-align: left;
    }
    th:last-child {
        border-right: none;
    }

    td {
        padding: 13px 10px;
        border-bottom: 1px solid #ede9fe;
        font-size: 15px;
        color: #22223b;
        background: #fff;
         border: 1px solid rgb(223, 220, 220);
    }
    tr {
        transition: background 0.2s;
    }
    tr:hover {
        background: #f3e8ff;
    }
    thead tr {
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
    }
    tbody tr:last-child td {
        border-bottom: none;
    }

    .pagination {
        padding: 10px 20px;
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
    }

    .page-btn {
        padding: 6px 12px;
        border-radius: 6px;
        background: #8b5cf6;
        color: white;
        cursor: pointer;
    }

</style>
</head>
<body>

<!-- ================== FILTROS ================== -->
<div class="filter-box">
    <div class="filter-header">
        <i class="ri-filter-3-fill"></i> Filtros
    </div>

    <div class="filters-grid">
        <div class="filter-item">
            <label><i class="ri-building-2-line"></i> Seleccionar Cliente</label>
            <select id="clientFilter"></select>
        </div>

        <div class="filter-item">
            <label><i class="ri-briefcase-line"></i> Seleccionar Trabajo</label>
            <select id="jobFilter"></select>
        </div>

        <div class="filter-item">
            <label><i class="ri-user-line"></i> Seleccionar Trabajador</label>
            <select id="workerFilter"></select>
        </div>

        <div class="filter-item">
            <label><i class="ri-community-line"></i> Centro de Trabajo</label>
            <select id="centerFilter"></select>
        </div>

        <div class="filter-item">
            <label><i class="ri-calendar-line"></i> Fecha</label>
            <input type="date" id="dateFilter">
        </div>
    </div>
</div>

<!-- ================== TABLE ================== -->
<div class="table-box">

    <div class="table-header">
        <h3>Registros de Entrada</h3>

    </div>

    <table>
        <thead>
            <tr>
                <th>Fecha</th>
                <th>Entrada</th>
                <th>Salida</th>
                <th>Tiempo Total</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>

    <div class="pagination">
        <span class="page-btn">1</span>
    </div>
</div>


<script>
/* ===================== DEMO DATA ===================== */
const rawData = [
    { client: "Client A", job: "Cleaning", worker: "Ali", center: "Center 1", date: "2025-01-01", checkin: "08:00", checkout: "12:00", total: "4h" },
    { client: "Client A", job: "Cleaning", worker: "Bilal", center: "Center 1", date: "2025-01-03", checkin: "09:00", checkout: "14:00", total: "5h" },
    { client: "Client B", job: "Office Maintenance", worker: "Ali", center: "Center 2", date: "2025-01-02", checkin: "07:45", checkout: "11:30", total: "3h 45m" },
    { client: "Client C", job: "Security", worker: "Hamza", center: "Center 3", date: "2025-01-05", checkin: "10:00", checkout: "16:00", total: "6h" },
];

/* ===================== POPULATE FILTERS ===================== */
function populateFilters() {
    fillDropdown(clientFilter, [...new Set(rawData.map(x => x.client))], "Todos los Clientes");
    fillDropdown(jobFilter, [...new Set(rawData.map(x => x.job))], "Todos los Trabajos");
    fillDropdown(workerFilter, [...new Set(rawData.map(x => x.worker))], "Todos los Trabajadores");
    fillDropdown(centerFilter, [...new Set(rawData.map(x => x.center))], "Todos los Centros");

    renderTable(rawData);
}

function fillDropdown(el, arr, placeholder) {
    el.innerHTML = `<option value="">${placeholder}</option>`;
    arr.forEach(v => el.innerHTML += `<option value="${v}">${v}</option>`);
}

/* ===================== FILTER LOGIC ===================== */
document.querySelectorAll("select, input").forEach(el => {
    el.addEventListener("change", applyFilters);
});

function applyFilters() {
    let f = {
        client: clientFilter.value,
        job: jobFilter.value,
        worker: workerFilter.value,
        center: centerFilter.value,
        date: dateFilter.value,
    };

    const filtered = rawData.filter(x =>
        (!f.client || x.client === f.client) &&
        (!f.job || x.job === f.job) &&
        (!f.worker || x.worker === f.worker) &&
        (!f.center || x.center === f.center) &&
        (!f.date || x.date === f.date)
    );

    renderTable(filtered);
}

/* ===================== TABLE RENDER ===================== */
function renderTable(rows) {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";

    rows.forEach(r => {
        tbody.innerHTML += `
            <tr>
                <td>${r.date}</td>
                <td>${r.checkin}</td>
                <td>${r.checkout}</td>
                <td>${r.total}</td>
            </tr>
        `;
    });
}

populateFilters();
</script>

</body>
</html>
