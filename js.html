<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OSM City/Postal Validation</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    input { width: 100%; padding: 10px; border: 1px solid #aaa; border-radius: 5px; }
    ul { list-style: none; padding: 0; margin: 0; border: 1px solid #aaa; border-radius: 5px; max-height: 200px; overflow-y: auto; }
    ul li { padding: 10px; cursor: pointer; }
    ul li:hover { background: #f0f0f0; }
    #selected { margin-top: 15px; padding: 10px; background: #eef; border-radius: 6px; }
  </style>
</head>
<body>
  <h2>Search City / Province / Country / Postal</h2>
  <input type="text" id="address-input" placeholder="Enter address..." />
  <ul id="results"></ul>
  <div id="selected"></div>

  <script>
    const input = document.getElementById("address-input");
    const resultsList = document.getElementById("results");
    const selectedOutput = document.getElementById("selected");

    let timeout = null;

    input.addEventListener("input", () => {
      clearTimeout(timeout);
      const query = input.value.trim();

      if (query.length < 3) {
        resultsList.innerHTML = "";
        return;
      }

      timeout = setTimeout(async () => {
        const url = `https://nominatim.openstreetmap.org/search?format=json&addressdetails=1&q=${encodeURIComponent(query)}`;

        const res = await fetch(url, {
          headers: { "User-Agent": "DemoApp/1.0 (your-email@example.com)" }
        });

        const data = await res.json();
        resultsList.innerHTML = "";

        if (data.length === 0) {
          resultsList.innerHTML = "<li>No results found</li>";
          return;
        }

        data.forEach(place => {
          const li = document.createElement("li");
          li.textContent = place.display_name;
          li.addEventListener("click", () => {
            input.value = place.display_name;
            resultsList.innerHTML = "";

            const addr = place.address || {};
            selectedOutput.innerHTML = `
              <strong>✅ Selected Address:</strong><br>
              City: ${addr.city || addr.town || addr.village || "-"}<br>
              Province/State: ${addr.state || "-"}<br>
              Country: ${addr.country || "-"}<br>
              Postal Code: ${addr.postcode || "-"}
            `;
          });
          resultsList.appendChild(li);
        });
      }, 400);
    });
  </script>
</body>
</html>
