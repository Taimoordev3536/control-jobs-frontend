[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  # Allow public Next.js environment variables to be in the build output
  # NEXT_PUBLIC_* variables are intentionally embedded in the client bundle
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_GOOGLE_MAPS_API_KEY,NEXT_PUBLIC_API_BASE_URL,NEXTAUTH_URL"

# Cache Next.js build for faster deploys
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/image*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
