<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<title>Work Summary Page</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f5f3fb;
  }

  .card {
    width: 90%;
    max-width: 900px;
    margin: 30px auto;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .header {
    background: linear-gradient(90deg, #8a2be2, #b26df3);
    color: white;
    padding: 20px;
  }

  .header h2 {
    margin: 0 0 10px;
    font-size: 20px;
  }

  .list div {
    margin: 4px 0;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .stats {
    display: flex;
    justify-content: space-around;
    text-align: center;
    padding: 20px;
    border-bottom: 1px solid #ccc;
  }

  .stats div {
    font-size: 14px;
  }

  .stats strong {
    display: block;
    font-size: 18px;
  }

   .menu-container {
    background: #ffffff;
    border-bottom: 1px solid #dcdcdc;
    padding-left: 20px;
  }

  .menu-bar {
    display: flex;
    gap: 40px;
    height: 48px;
    align-items: center;
  }

  .menu-item {
    font-size: 16px;
    color: #6e6e6e; /* grey text */
    cursor: pointer;
    padding: 12px 4px;
    border-bottom: 3px solid transparent;
    transition: 0.2s;
  }

  /* ACTIVE TAB */
  .menu-item.active {
    color: #682c8b;          /* purple text exactly like screenshot */
    border-bottom: 3px solid #682c8b; /* purple underline */
    font-weight: 600;
  }

  /* Hover effect (optional but subtle like UI) */
  .menu-item:hover {
    color: #682c8b;
  }
  .menu-item:hover {
    background: #eee;
  }
</style>
</head>

<body>

<div class="card">
  <!-- Top Purple Header -->
  <div class="header">
    <h2>Jueves, 18 septiembre, 2025</h2>

    <div class="list">
      <div>📁 Cliente 1</div>
      <div>🏢 Work Center 1</div>
      <div>📄 Job xxxx</div>
      <div>👤 Worker xx</div>
    </div>
  </div>

  <!-- Time Statistics Row -->
  <div class="stats">
    <div>
      <strong style="color:#5b4bff;">02:00:00</strong>
      TIEMPO ESTIMADO
    </div>

    <div>
      <strong style="color:#3abb66;">01:57:10</strong>
      TIEMPO TRABAJADO
    </div>

    <div>
      <strong style="color:#e68a2c;">00:15:12</strong>
      TIEMPO DESCANSO
    </div>

    <div>
      <strong style="color:#e63939;">-00:02:50</strong>
      DIFERENCIA
    </div>
  </div>

  <!-- MENU BAR (Horizontal) -->
  <div class="menu-bar">
    <div class="menu-item active">Fichajes</div>
    <div class="menu-item">Tareas</div>
    <div class="menu-item">Encuestas</div>
    <div class="menu-item">Alertas</div>
  </div>

</div>

</body>
</html>
